# Test Project Configuration (Shared)
#
# Example configuration for a dedicated test environment.
# Copy this to your test coordination repo's project-shared.yaml.
#
# This configuration assumes you've created:
# - A test coordination repo (e.g., YourOrg/coord-test or youruser/coord-test)
# - A test code repo (e.g., YourOrg/code-test or youruser/code-test)
# - A GitHub Project board with standard fields

project:
  name: "Coordination Test"

  coordination_repo:
    github: "YourOrg/coord-test"  # <-- Change to your test repo
    branch: "main"

  github:
    enabled: true
    org: "YourOrg"  # <-- Change to your org or username

    # GitHub Project Board (optional but recommended for full testing)
    # Create with: gh project create --owner YourOrg --title "Coordination Test Board"
    # Get number: gh project list --owner YourOrg
    project_board_number: null  # Set after creating
    project_board_id: null      # Set after creating (GraphQL ID)

    # GitHub Project Custom Fields
    # Get IDs: gh project field-list <number> --owner YourOrg --format json
    project_fields:
      status:
        field_id: null  # Set after getting IDs
        options:
          triage: null
          ready: null
          in-progress: null
          ready-for-review: null
          review: null
          ready-to-test: null
          testing: null
          blocked: null
          done: null

      logged_time:
        field_id: null

      planned_time:
        field_id: null

      target_date:
        field_id: null

      start_date:
        field_id: null

  # Standard label mappings (TreeMetrics 8-state workflow)
  label_mappings:
    status:
      - triage
      - ready
      - in-progress
      - ready-for-review
      - review
      - ready-to-test
      - testing
      - blocked
      - done

    priority:
      - high
      - medium
      - low

    type:
      - feature
      - bug
      - infrastructure
      - docs
      - test

# Test Code Repository
code_repositories:
  - name: "code-test"
    github: "YourOrg/code-test"  # <-- Change to your test code repo
    default_branch: "main"
    type: "generic"
